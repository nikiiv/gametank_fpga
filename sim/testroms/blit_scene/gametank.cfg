# ld65 config for a 32 KB EEPROM-style GameTank cart ($8000-$FFFF,
# vectors in the top 6 bytes). Output is a raw 32768-byte .gtr image.
MEMORY {
    ROM:     start = $8000, size = $7FFA, type = ro, fill = yes, fillval = $FF, file = %O;
    VECTORS: start = $FFFA, size = 6,     type = ro, fill = yes, fillval = $FF, file = %O;
}
SEGMENTS {
    CODE:    load = ROM,     type = ro;
    VECTORS: load = VECTORS, type = ro;
}
